name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Rust components
      run: rustup component add clippy rustfmt
    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
    - name: Run clippy
      run: cargo clippy --all-targets -p osm-pbf-parquet
    - name: Run cargo fmt
      run: cargo fmt -p osm-pbf-parquet -- --check

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
    - name: Build
      run: cargo build --release -p osm-pbf-parquet
    - name: Run unit tests
      run: cargo test --workspace
    - name: Install osmium
      run: sudo apt-get update && sudo apt-get install -y osmium-tool
    - name: Prepare and run test
      run: ./test.sh
      working-directory: ./osm-pbf-parquet/test
    - name: Benchmark
      run: cargo bench -p osm-pbf-parquet
