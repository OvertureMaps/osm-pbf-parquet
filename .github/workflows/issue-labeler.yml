# Inspired by: https://github.com/stefanbuck/ristorante
# See: https://stefanbuck.com/blog/codeless-contributions-with-github-issue-forms
---

name: Issue labeler
on:
  issues:
    types: [ opened ]

permissions:
  contents: read # Required for checking out repo content

jobs:
  label-issues:
    name: Label issues
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [ action_item.yaml, bug.yml, default.yml, documentation.yaml, feature.yml, phase_of_development.yml, question.yaml, release-feedback.yaml ]
    permissions:
      issues: write # Required for labeling issues
      id-token: write # Required for OIDC authentication
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@10dcc54158ba4c137713d9d69d70a2da63b6bda3 # v3.2.3
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ matrix.template }}

      - name: Set labels based on policy
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          template: ${{ matrix.template }}
          token: ${{ secrets.GITHUB_TOKEN }}

  label-issues-default:
    name: Label issues (default)
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required for labeling issues
      id-token: write # Required for OIDC authentication
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@10dcc54158ba4c137713d9d69d70a2da63b6bda3 # v3.2.3
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/default.yml

      - name: Set labels based on policy
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: without-policy
          block-list: |
            Other
          token: ${{ secrets.GITHUB_TOKEN }}
